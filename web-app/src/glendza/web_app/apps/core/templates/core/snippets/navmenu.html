<nav class="navmenu">
  {% if menu_items %}
    <ul class="menu">
      {% for item in menu_items %}
        <li>
          <a href="{{ item.link }}"
             {% if item.open_in_new_tab %}
               target="_blank" rel="noopener noreferrer"
             {% endif %}>
            {{ item.title }}
          </a>
        </li>
      {% endfor %}
    </ul>
  {% endif %}
  <button id="theme-toggle-button"
          class="theme-toggler"
          aria-label="Toggle theme">
  </button>
</nav>
